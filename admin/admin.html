<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administratora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <nav class="bg-dark text-white p-4" style="min-height: 100vh; width: 250px;">
            <h4 class="mb-4">Admin Panel</h4>
            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="/admin/dashboard">📊 Dashboard</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="/admin/users">👥 Użytkownicy</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="/admin/categories">📂 Kategorie</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="/admin/ads">📢 Ogłoszenia</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="/admin/messages">💬 Wiadomości</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="/admin/settings">⚙️ Ustawienia</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="/admin/stats">📈 Statystyki</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="#" onclick="logout()">🚪 Wyloguj się</a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="flex-grow-1 p-4">
            <div class="container-fluid">
                <h1 class="mb-4">Dashboard</h1>
                <div class="row">
                    <div class="col-md-3 mb-4">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5 class="card-title">Użytkownicy</h5>
                                <h2 id="totalUsers">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-4">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5 class="card-title">Ogłoszenia</h5>
                                <h2 id="totalAds">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-4">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5 class="card-title">Aktywne</h5>
                                <h2 id="activeAds">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-4">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5 class="card-title">Kategorie</h5>
                                <h2 id="totalCategories">0</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                if (data.success) {
                    document.getElementById('totalUsers').textContent = data.stats.totalUsers;
                    document.getElementById('totalAds').textContent = data.stats.totalAds;
                    document.getElementById('activeAds').textContent = data.stats.activeAds;
                    document.getElementById('totalCategories').textContent = data.stats.totalCategories;
                }
            } catch (error) {
                console.error('Błąd:', error);
            }
        }

        async function logout() {
            try {
                await fetch('/api/logout');
                window.location.href = '/login';
            } catch (error) {
                alert('Błąd wylogowania');
            }
        }

        loadStats();
    </script>
</body>
</html>
